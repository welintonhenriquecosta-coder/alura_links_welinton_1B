<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu blog tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .cabecalho {
            background-color: #002b80; /* Azul escuro original */
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin: 20px;
        }

        .cabecalho h1 {
            margin-bottom: 15px;
            font-size: 32px;
        }

        .conteudo {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .icone {
            width: 60px;
            margin: 20px 0;
            display: block;
        }

        .post {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .post h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .autor {
            font-style: italic;
            margin-bottom: 15px;
            color: #333;
        }

        .texto {
            line-height: 1.6;
            color: #222;
            margin-bottom: 20px;
        }

        .area-curtidas {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .botao {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border: 1px solid #999;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            font-size: 16px;
        }

        .botao.ativo {
            background: #ffcccc;
            border-color: #ff4d4d;
        }

        .botao.ativo.legal {
            background: #fff2cc;
            border-color: #ffcc00;
        }
    </style>
</head>
<body>
    <header class="cabecalho">
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>

    <main class="conteudo">
        <img src="icone.png" alt="Ícone de tecnologia" class="icone">

        <article class="post">
            <h2>Meu primeiro post</h2>
            <p class="autor">Por: Welinton Henrique</p>
            <p class="texto">Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>

            <div class="area-curtidas">
                <button class="botao" id="btn-coracao" onclick="alternarCoracao()">❤️ <span id="cont-coracao">0</span></button>
                <button class="botao legal" id="btn-legal" onclick="alternarLegal()">👍 <span id="cont-legal">0</span></button>
            </div>
        </article>
    </main>

    <script>
        let coracao = 0;
        let legal = 0;
        let deuCoracao = false;
        let deuLegal = false;

        function alternarCoracao() {
            if (!deuCoracao) {
                coracao++;
                deuCoracao = true;
                document.getElementById('btn-coracao').classList.add('ativo');
            } else {
                coracao--;
                deuCoracao = false;
                document.getElementById('btn-coracao').classList.remove('ativo');
            }
            document.getElementById('cont-coracao').textContent = coracao;
        }

        function alternarLegal() {
            if (!deuLegal) {
                legal++;
                deuLegal = true;
                document.getElementById('btn-legal').classList.add('ativo');
            } else {
                legal--;
                deuLegal = false;
                document.getElementById('btn-legal').classList.remove('ativo');
            }
            document.getElementById('cont-legal').textContent = legal;
        }
    </script>
</body>
</html>
