<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu blog tech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .cabecalho {
            /* 🎨 Escolha uma cor abaixo:
            #002b80 → Azul escuro
            #006633 → Verde escuro
            #b30000 → Vermelho escuro
            #800080 → Roxo
            #cc6600 → Laranja
            #008080 → Turquesa
            #333333 → Cinza escuro
            #660033 → Vinho
            #003366 → Azul marinho
            */
            background-color: #002b80;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin: 20px;
        }

        .cabecalho h1 {
            margin-bottom: 15px;
            font-size: 32px;
        }

        .conteudo {
            margin: 0 40px;
        }

        .icone {
            width: 60px;
            margin: 20px 0;
            display: block;
        }

        .post h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .autor {
            font-style: italic;
            margin-bottom: 15px;
            color: #333;
        }

        .texto {
            line-height: 1.6;
            color: #222;
            border-left: 1px solid #ccc;
            padding-left: 15px;
        }
    </style>
</head>
<body>
    <header class="cabecalho">
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>

    <main class="conteudo">
                <img src="icone.png" alt="Ícone de tecnologia" class="icone">

        <article class="post">
            <h2>Meu primeiro post</h2>
            <p class="autor">Por: Welinton Henrique</p>
            <p class="texto">Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas de programação e curiosidades da área de tecnologia.</p>
        </article>
    </main>
</body>
</html>
